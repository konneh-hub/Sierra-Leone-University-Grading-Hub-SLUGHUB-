services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: result-app-postgres
    environment:
      POSTGRES_DB: srms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - result-app-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: result-app-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - result-app-network

  # Backend Application
  backend:
    build: .
    container_name: result-app-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/srms_db
      JWT_SECRET: your-super-secret-jwt-key-here
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SYSTEM_ADMIN_JWT_SECRET: system_admin_secret_key
      SYSTEM_ADMIN_JWT_EXPIRES_IN: 15m
      BCRYPT_ROUNDS: 12
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - result-app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  result-app-network:
    driver: bridge